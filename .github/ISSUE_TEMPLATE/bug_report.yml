name: Bug report
description: Report a reproducible problem with Grey's Express.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the bug.
      placeholder: |
        1. Start a server with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include Minecraft, Fabric Loader, Fabric API, Wathe, Wathe Extended, and Grey's Express versions.
      placeholder: "Minecraft 1.21.1, Fabric Loader 0.18.4, Grey's Express 1.0.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, crash reports, or screenshots.
      render: text
